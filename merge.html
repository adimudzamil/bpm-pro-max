<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERGE — PDF Combiner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖇️</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖇️</text></svg>">
   
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --surface2: #18181c;
    --border: rgba(255,255,255,0.07);
    --border-bright: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --text-muted: #666;
    --text-dim: #444;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --accent-glow: rgba(232,255,71,0.25);
    --red: #ff4757;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial glow at center */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(232,255,71,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── Header ── */
  header {
    padding: 52px 0 48px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .logo-block { display: flex; flex-direction: column; gap: 6px; }

  .logo {
    font-size: clamp(36px, 8vw, 56px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--text);
  }

  .logo span {
    color: var(--accent);
    display: inline-block;
    animation: blink 3s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 90%, 100% { opacity: 1; }
    95% { opacity: 0; }
  }

  .byline {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.05em;
    color: #3a3a3a;
    margin-top: 4px;
    margin-bottom: 2px;
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(232,255,71,0.2);
    padding: 6px 12px;
    border-radius: 100px;
    white-space: nowrap;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  /* ── Drop Zone ── */
  .drop-zone {
    border: 1.5px dashed var(--border-bright);
    border-radius: var(--radius);
    padding: 56px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    margin-bottom: 32px;
  }

  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, var(--accent-glow) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .drop-zone:hover::before, .drop-zone.drag-over::before { opacity: 1; }

  .drop-zone.drag-over { transform: scale(1.01); }

  .drop-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 20px;
    border: 1.5px solid var(--border-bright);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    position: relative;
    z-index: 1;
    transition: border-color 0.25s, transform 0.25s;
  }

  .drop-zone:hover .drop-icon {
    border-color: var(--accent);
    transform: translateY(-3px);
  }

  .drop-icon svg { width: 24px; height: 24px; color: var(--accent); }

  .drop-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  .drop-sub {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    position: relative;
    z-index: 1;
  }

  .drop-sub span {
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  input[type="file"] { display: none; }

  /* ── File List ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label .count {
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 100px;
    padding: 2px 9px;
    font-size: 11px;
  }

  .clear-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .clear-btn:hover { color: var(--red); border-color: var(--red); }

  .file-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
  }

  .file-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    cursor: grab;
    transition: all 0.2s ease;
    animation: slideIn 0.3s ease forwards;
    position: relative;
    overflow: hidden;
  }

  .file-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .file-card:hover { border-color: var(--border-bright); transform: translateX(2px); }
  .file-card:hover::before { opacity: 1; }
  .file-card.dragging { opacity: 0.4; cursor: grabbing; transform: scale(0.98); }
  .file-card.drag-target { border-color: var(--accent); background: var(--surface2); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .file-order {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    min-width: 22px;
    text-align: center;
  }

  .file-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--accent-dim);
    border: 1px solid rgba(232,255,71,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .file-icon svg { width: 16px; height: 16px; color: var(--accent); }

  .file-info { flex: 1; min-width: 0; }

  .file-name {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .file-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 12px;
  }

  .file-meta .pages { color: var(--accent); }

  .file-actions { display: flex; gap: 6px; }

  .icon-btn {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    transition: all 0.2s;
  }

  .icon-btn:hover { border-color: var(--border-bright); color: var(--text); }
  .icon-btn.del:hover { border-color: var(--red); color: var(--red); background: rgba(255,71,87,0.08); }
  .icon-btn svg { width: 13px; height: 13px; }

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .divider-line { flex: 1; height: 1px; background: var(--border); }

  .divider-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── Summary bar ── */
  .summary {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat-chip {
    flex: 1;
    min-width: 100px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-val {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--accent);
    line-height: 1;
  }

  .stat-key {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── Merge Button ── */
  .merge-btn {
    width: 100%;
    padding: 18px 32px;
    background: var(--accent);
    color: #0a0a0b;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .merge-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
    pointer-events: none;
  }

  .merge-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px var(--accent-glow); }
  .merge-btn:active { transform: translateY(0); }
  .merge-btn:disabled {
    background: var(--surface2);
    color: var(--text-dim);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .merge-btn svg { width: 18px; height: 18px; }

  /* ── Progress ── */
  .progress-wrap {
    display: none;
    flex-direction: column;
    gap: 10px;
    margin-top: 20px;
  }

  .progress-wrap.visible { display: flex; }

  .progress-bar-track {
    height: 3px;
    background: var(--surface2);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 100px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-align: center;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 100px;
    padding: 12px 22px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--text);
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* ── Footer ── */
  footer {
    position: relative;
    z-index: 1;
    padding: 24px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  footer span { color: var(--accent); }

  /* ── Empty state ── */
  .empty-state {
    display: none;
    text-align: center;
    padding: 32px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
  }

  .empty-state.visible { display: block; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 100px; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    header { flex-direction: column; align-items: flex-start; }
    .summary { gap: 8px; }
    .stat-chip { padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-block">
      <div class="logo">MERGE<span>.</span></div>
      <div class="byline">by 2100551</div>
      <div class="tagline">PDF Combiner — 100% On-Device</div>
    </div>
    <div class="badge">No Upload · No Server</div>
  </header>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 3v13M7 9l5-6 5 6M5 21h14" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="drop-title">Drop your PDFs here</div>
    <div class="drop-sub">
      Drag & drop files, or <span id="browseLink">browse to upload</span>
    </div>
    <input type="file" id="fileInput" accept=".pdf" multiple>
  </div>

  <!-- File List Section -->
  <div id="listSection" style="display:none">
    <div class="section-header">
      <div class="section-label">
        Files
        <span class="count" id="fileCount">0</span>
      </div>
      <button class="clear-btn" id="clearBtn">Clear all</button>
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">Summary</div>
      <div class="divider-line"></div>
    </div>

    <div class="summary">
      <div class="stat-chip">
        <div class="stat-val" id="statFiles">0</div>
        <div class="stat-key">Files</div>
      </div>
      <div class="stat-chip">
        <div class="stat-val" id="statPages">0</div>
        <div class="stat-key">Total Pages</div>
      </div>
      <div class="stat-chip">
        <div class="stat-val" id="statSize">0</div>
        <div class="stat-key">Total Size</div>
      </div>
    </div>

    <button class="merge-btn" id="mergeBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 6H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-3M15 3H9v6h6V3zM12 12v6M9 15l3 3 3-3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Merge & Download
    </button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel">Processing…</div>
    </div>
  </div>
</div>

<footer>
  Files never leave your device — processed entirely in your browser<br>
  <span>MERGE</span> · 2100551
</footer>

<div class="toast" id="toast"></div>

<script>
const PDFLib = window.PDFLib;

// State
let files = []; // { file, name, size, pages, id }
let dragSrcIdx = null;

// DOM refs
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const browseLink = document.getElementById('browseLink');
const listSection = document.getElementById('listSection');
const fileList = document.getElementById('fileList');
const fileCount = document.getElementById('fileCount');
const clearBtn = document.getElementById('clearBtn');
const mergeBtn = document.getElementById('mergeBtn');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const statFiles = document.getElementById('statFiles');
const statPages = document.getElementById('statPages');
const statSize = document.getElementById('statSize');

// ── Drop zone events ──
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFiles(Array.from(e.dataTransfer.files));
});
dropZone.addEventListener('click', () => fileInput.click());
browseLink.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
fileInput.addEventListener('change', () => handleFiles(Array.from(fileInput.files)));

// ── Clear ──
clearBtn.addEventListener('click', () => {
  files = [];
  render();
  showToast('All files cleared', 'default');
});

// ── Handle file add ──
async function handleFiles(incoming) {
  const pdfs = incoming.filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
  if (!pdfs.length) { showToast('Only PDF files are supported', 'error'); return; }

  for (const f of pdfs) {
    const id = Math.random().toString(36).slice(2);
    const pages = await getPageCount(f);
    files.push({ file: f, name: f.name, size: f.size, pages, id });
  }

  render();
  showToast(`${pdfs.length} file${pdfs.length > 1 ? 's' : ''} added`, 'success');
}

// ── Get page count via pdf-lib ──
async function getPageCount(file) {
  try {
    const buf = await file.arrayBuffer();
    const pdf = await PDFLib.PDFDocument.load(buf, { ignoreEncryption: true });
    return pdf.getPageCount();
  } catch { return '?'; }
}

// ── Render ──
function render() {
  fileInput.value = '';
  listSection.style.display = files.length ? '' : 'none';
  fileCount.textContent = files.length;

  // Stats
  const totalPages = files.reduce((a, f) => a + (typeof f.pages === 'number' ? f.pages : 0), 0);
  const totalSize = files.reduce((a, f) => a + f.size, 0);
  statFiles.textContent = files.length;
  statPages.textContent = totalPages || '—';
  statSize.textContent = formatSize(totalSize);

  // Render cards
  fileList.innerHTML = '';
  files.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'file-card';
    card.draggable = true;
    card.dataset.id = f.id;
    card.innerHTML = `
      <div class="file-order">${String(i + 1).padStart(2, '0')}</div>
      <div class="file-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke-linecap="round"/>
          <path d="M14 2v6h6M9 13h6M9 17h4" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="file-info">
        <div class="file-name" title="${escHtml(f.name)}">${escHtml(f.name)}</div>
        <div class="file-meta">
          <span>${formatSize(f.size)}</span>
          <span class="pages">${f.pages} ${f.pages === 1 ? 'page' : 'pages'}</span>
        </div>
      </div>
      <div class="file-actions">
        <button class="icon-btn" data-up="${f.id}" title="Move up">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn" data-down="${f.id}" title="Move down">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn del" data-del="${f.id}" title="Remove">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    `;

    // Drag
    card.addEventListener('dragstart', () => { dragSrcIdx = i; setTimeout(() => card.classList.add('dragging'), 0); });
    card.addEventListener('dragend', () => { card.classList.remove('dragging'); document.querySelectorAll('.file-card').forEach(c => c.classList.remove('drag-target')); });
    card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-target'); });
    card.addEventListener('dragleave', () => card.classList.remove('drag-target'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-target');
      const targetIdx = i;
      if (dragSrcIdx !== null && dragSrcIdx !== targetIdx) {
        const moved = files.splice(dragSrcIdx, 1)[0];
        files.splice(targetIdx, 0, moved);
        render();
      }
    });

    fileList.appendChild(card);
  });

  // Button actions
  fileList.querySelectorAll('[data-up]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); moveFile(btn.dataset.up, -1); });
  });
  fileList.querySelectorAll('[data-down]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); moveFile(btn.dataset.down, 1); });
  });
  fileList.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); removeFile(btn.dataset.del); });
  });
}

function moveFile(id, dir) {
  const idx = files.findIndex(f => f.id === id);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= files.length) return;
  [files[idx], files[newIdx]] = [files[newIdx], files[idx]];
  render();
}

function removeFile(id) {
  files = files.filter(f => f.id !== id);
  render();
  if (!files.length) showToast('No files remaining', 'default');
}

// ── Merge ──
mergeBtn.addEventListener('click', mergePDFs);

async function mergePDFs() {
  if (files.length < 2) { showToast('Add at least 2 PDFs to merge', 'error'); return; }

  mergeBtn.disabled = true;
  progressWrap.classList.add('visible');
  setProgress(0, 'Starting…');

  try {
    const merged = await PDFLib.PDFDocument.create();

    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      setProgress(Math.round((i / files.length) * 85), `Processing ${f.name}…`);
      const buf = await f.file.arrayBuffer();
      const doc = await PDFLib.PDFDocument.load(buf, { ignoreEncryption: true });
      const pageIdxs = doc.getPageIndices();
      const copied = await merged.copyPages(doc, pageIdxs);
      copied.forEach(p => merged.addPage(p));
    }

    setProgress(92, 'Finalising…');
    const bytes = await merged.save();
    setProgress(100, 'Done!');

    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `merged_${Date.now()}.pdf`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);

    showToast(`Merged ${files.length} files successfully`, 'success');
  } catch (err) {
    console.error(err);
    showToast('Failed to merge — check for encrypted PDFs', 'error');
  } finally {
    mergeBtn.disabled = false;
    setTimeout(() => {
      progressWrap.classList.remove('visible');
      setProgress(0, '');
    }, 2500);
  }
}

// ── Helpers ──
function setProgress(pct, label) {
  progressFill.style.width = pct + '%';
  progressLabel.textContent = label;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg, type = 'default') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
